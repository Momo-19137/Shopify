<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Shopify Simulator Pro</title>
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --ios-gray: #8e8e93;
            --ios-bg: #f2f2f7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--ios-bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            color: #000;
        }

        .card { 
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            padding: 30px 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center; 
            width: 88%; 
            max-width: 360px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        #loginScreen { display: block; }
        #appScreen { display: none; }
        
        .app-icon { 
            border-radius: 20%; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            background: white;
        }

        h2 { font-weight: 700; font-size: 24px; margin-bottom: 8px; letter-spacing: -0.5px; }
        p { color: var(--ios-gray); margin-bottom: 25px; font-size: 15px; line-height: 1.4; }

        .setup-group { margin-bottom: 20px; text-align: left; }
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: 600; 
            color: var(--ios-gray); 
            margin-bottom: 6px; 
            margin-left: 4px;
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #d1d1d6; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            background: #fff;
            transition: border 0.2s ease;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--ios-blue);
        }

        button { 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 17px; 
            cursor: pointer; 
            width: 100%; 
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        .btn-login { background: #000; color: white; margin-top: 10px; }
        .btn-start { background: var(--ios-green); color: white; margin-top: 10px; margin-bottom: 12px; }
        .btn-stop { background: var(--ios-red); color: white; }
        
        #status { 
            margin-top: 25px; 
            font-weight: 600; 
            font-size: 14px; 
            color: var(--ios-gray);
            padding: 8px;
            background: #f8f8f8;
            border-radius: 8px;
            display: inline-block;
            min-width: 100px;
        }

        #loginError { 
            color: var(--ios-red); 
            font-size: 13px; 
            margin-top: 14px; 
            display: none; 
            font-weight: 500; 
        }

        /* Subtiele animatie bij schermwissel */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="card fade-in">
        <img src="icon.png" width="80" height="80" class="app-icon">
        <h2>Member Access</h2>
        <p>Unlock your professional Shopify notification simulator.</p>
        <div class="setup-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="example@icloud.com" autocomplete="email">
            <label>Password</label>
            <input type="password" id="password" placeholder="Required">
            <label>Access Code</label>
            <input type="text" id="accessCode" placeholder="Enter 5-digit code">
        </div>
        <button class="btn-login" onclick="checkLogin()">Sign In</button>
        <div id="loginError">Invalid credentials or access code.</div>
    </div>

    <div id="appScreen" class="card fade-in">
        <img src="icon.png" width="80" height="80" class="app-icon">
        <h2>Simulator Console</h2>
        <p>Configure your live notifications stream.</p>
        
        <div class="setup-group">
            <label>Store Display Name</label>
            <input type="text" id="storeNameInput" placeholder="Online Store">
            <label>Auto-Send Interval (s)</label>
            <input type="number" id="intervalInput" value="2" min="1">
        </div>

        <button class="btn-start" onclick="startSysteem()">Start Stream</button>
        <button class="btn-stop" onclick="stopSysteem()">Stop Stream</button>
        
        <div id="status">Status: Idle</div>
    </div>

    <script>
        const validCodes = [
            "ABC12", "XYX88", "KL3P6", "JRT99", "BND45", "MQR11", "ZST67", "HJK23", "VFR89", "LOP54",
            "MNO12", "QWE34", "RTY56", "ASD78", "FGH90", "ZXC21", "VBN43", "UIO65", "PAS87", "DFG09",
            "JKL32", "POU54", "YTR76", "REW98", "NBV10", "CXS29", "MLK47", "JHG63", "FDA81", "POW02",
            "BNM19", "KJH37", "GDS55", "TRE73", "YUI91", "HGF08", "DSA26", "MNB44", "VXC62", "POI80",
            "LKJ07", "HFD25", "SAM43", "PET61", "TOM79", "DAN97", "BEN15", "JES33", "MAX51", "LOU69",
            "KIM87", "MAR05", "SOP23", "JUL41", "EMI59", "LUC77", "TIM95", "CAS13", "ROB31", "MAR49",
            "ANN67", "SAR85", "JOY03", "NOA21", "LEO39", "ZEO57", "XAV75", "PAU93", "VIC11", "FLO29",
            "BRU47", "CLA65", "OLI83", "SEA01", "ANT19", "EDW37", "FRA55", "GEO73", "HAR91", "IZA09",
            "JAS27", "KAT45", "LIL63", "MIA81", "NIN99", "OPA17", "QUI35", "ROS53", "STE71", "TES89",
            "UNA07", "VAL25", "WES43", "XEN61", "YAR79", "ZOE97", "ALB15", "BOR33", "CYR51", "DOR69"
        ];

        if (localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
        }

        function checkLogin() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('accessCode').value.toUpperCase();
            
            if (email.includes('@') && validCodes.includes(code)) {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        let audio = new Audio('kaching.mp3');
        let orderNumber = 1; 
        let timer = null;

        function startSysteem() {
            if (timer !== null) return;
            const intervalSeconds = document.getElementById('intervalInput').value;
            const statusDiv = document.getElementById('status');

            Notification.requestPermission().then(perm => {
                if (perm === "granted") {
                    statusDiv.innerText = "Status: Live";
                    statusDiv.style.color = "var(--ios-green)";
                    sendNotification();
                    timer = setInterval(sendNotification, intervalSeconds * 1000);
                }
            });
        }

        function stopSysteem() {
            clearInterval(timer);
            timer = null;
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Status: Idle";
            statusDiv.style.color = "var(--ios-gray)";
        }

        function sendNotification() {
            let storeName = document.getElementById('storeNameInput').value.trim() || "Online Store";
            const options = [
                { price: "€29.95", items: "1 item" },
                { price: "€49.95", items: "2 items" },
                { price: "€69.95", items: "2 items" },
                { price: "€89.95", items: "3 items" }
            ];
            const randomOption = options[Math.floor(Math.random() * options.length)];
            const title = "Order #" + orderNumber;
            const bodyText = randomOption.price + ", " + randomOption.items + " from Online Store • " + storeName;

            new Notification(title, { body: bodyText, icon: "icon.png" });
            audio.play().catch(e => {});
            orderNumber++;
        }
    </script>
</body>
</html>
