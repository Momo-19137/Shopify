<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Shopify</title>
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-dark-green: #006400;
            --ios-dark-red: #8b0000;
            --ios-gray: #8e8e93;
            --ios-bg: #f2f2f7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--ios-bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            color: #000;
        }

        .card { 
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            padding: 30px 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center; 
            width: 88%; 
            max-width: 360px;
            border: 1px solid rgba(255,255,255,0.3);
            margin: 20px 0;
        }
        
        #loginScreen { display: block; }
        #appScreen { display: none; }
        
        .app-icon { border-radius: 20%; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        h2 { font-weight: 700; font-size: 24px; margin-bottom: 8px; letter-spacing: -0.5px; }
        p { color: var(--ios-gray); margin-bottom: 25px; font-size: 15px; }

        .setup-group { margin-bottom: 20px; text-align: left; }
        .price-settings { border-top: 1px solid #e5e5ea; padding-top: 15px; margin-top: 15px; }
        
        label { 
            display: block; 
            font-size: 11px; 
            font-weight: 600; 
            color: var(--ios-gray); 
            margin-bottom: 6px; 
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #d1d1d6; 
            border-radius: 10px; 
            font-size: 16px; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            background: #fff;
        }

        button { 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
            width: 100%; 
            color: white;
        }

        .btn-login { background: #000; margin-top: 10px; }
        .btn-start { background: var(--ios-dark-green); margin-bottom: 12px; }
        .btn-stop { background: var(--ios-dark-red); }
        
        #status { margin-top: 20px; font-weight: 600; font-size: 14px; color: var(--ios-gray); }
        #loginError { color: var(--ios-dark-red); font-size: 13px; display: none; margin-top: 10px; }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loginScreen" class="card fade-in">
        <img src="icon.png" width="80" height="80" class="app-icon">
        <h2>Member Access</h2>
        <div class="setup-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com">
            <label>Access Code</label>
            <input type="text" id="accessCode" placeholder="Enter 6-character code">
        </div>
        <button class="btn-login" onclick="checkLogin()">Login</button>
        <div id="loginError">Invalid access code.</div>
    </div>

    <div id="appScreen" class="card fade-in">
        <img src="icon.png" width="60" height="60" class="app-icon">
        <h2>Shopify Pro</h2>
        
        <div class="setup-group">
            <label>Store Display Name</label>
            <input type="text" id="storeNameInput" placeholder="Online Store">
            
            <label>Interval (seconds)</label>
            <input type="number" id="intervalInput" value="2">

            <div class="price-settings">
                <label>Price for 1 item (€)</label>
                <input type="text" id="price1" value="29.95" oninput="this.value = this.value.replace(/[^0-9.]/g, '')">
                
                <label>Price for 2 items (€)</label>
                <input type="text" id="price2" value="49.95" oninput="this.value = this.value.replace(/[^0-9.]/g, '')">
                
                <label>Price for 3 items (€)</label>
                <input type="text" id="price3" value="89.95" oninput="this.value = this.value.replace(/[^0-9.]/g, '')">
            </div>
        </div>

        <button class="btn-start" onclick="startSysteem()">Start Notifications</button>
        <button class="btn-stop" onclick="stopSysteem()">Stop Notifications</button>
        
        <div id="status">Status: Idle</div>
    </div>

    <script>
        const validCodes = [
            "A1B2C3", "4X7Y9Z", "K8L3P6", "J1R7T9", "B4N2D5", "9M2Q1R", "Z5S6T7", "H3J2K3", "V8F6R9", "L0P54K",
            "M1N9O2", "Q3W1E4", "R7T5Y6", "A8S2D8", "F9G4H0", "Z2X1C1", "V4B8N3", "U3I6O5", "P1A8S7", "D2F0G9",
            "J7K3L2", "P5O4U4", "Y1T7R6", "R8E9W8", "NBV10", "C9X2S9", "M4L7K7", "J1H6G3", "F8D1A1", "P0O2W2",
            "B7N1M9", "K3J7H7", "G5D5S5", "T7R3E3", "Y1U9I1", "H0G8F0", "D2S6A6", "M4N4B4", "V6X2C2", "P8O1I0",
            "L0K7J0", "H2F5D5", "S4A3M3", "P6E1T1", "T7O9M9", "D9A7N7", "B1E5N5", "J3E3S3", "M5A1X1", "L6O9U9",
            "K8I7M7", "M0A5R5", "S2O3P3", "J4U1L1", "E5M9I9", "L7U7C7", "T9I5M5", "C1A3S3", "R3O1B1", "M4A9R9",
            "A6N7N7", "S8A5R5", "J0O3Y3", "N2O1A1", "L3E9O9", "Z5E7O7", "X7A5V5", "P9A3U3", "V1I1C1", "F2L9O9",
            "B4R7U7", "C6L5A5", "O8L3I3", "S0E1A1", "A1N9T9", "E3D7W7", "F5R5A5", "G7E3O3", "H9A1R1", "I0Z9A9",
            "J2A7S7", "K4A5A5", "L6I3L3", "M8I1A1", "N9I9N9", "O1P7A7", "Q3U5I5", "R5O3S3", "S7T1E1", "T8E9S9",
            "U0N7A7", "V2A5L5", "W4E3S3", "X6E1N1", "Y8A9R9", "Z9O7E7", "A1L5B5", "B3O3R3", "C5Y1R1", "D6O9R9",
            "1A2B3C", "9X8Y7Z", "3K6L3P", "7J9R1T", "2B5N4D", "1M1Q2R", "6Z7S5T", "2H3J2K", "9V8F6R", "4L0P5K",
            "2M1N9O", "4Q3W1E", "6R7T5Y", "8A8S2D", "0F9G4H", "1Z2X1C", "3V4B8N", "5U3I6O", "7P1A8S", "9D2F0G",
            "2J7K3L", "4P5O4U", "6Y1T7R", "8R8E9W", "0N2B1V", "9C9X2S", "7M4L7K", "3J1H6G", "1F8D1A", "2P0O2W",
            "9B7N1M", "7K3J7H", "5G5D5S", "3T7R3E", "1Y1U9I", "0H0G8F", "6D2S6A", "4M4N4B", "2V6X2C", "0P8O1I",
            "7L0K7J", "5H2F5D", "3S4A3M", "1P6E1T", "9T7O9M", "7D9A7N", "5B1E5N", "3J3E3S", "1M5A1X", "9L6O9U"
        ];

        if (localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
        }

        function checkLogin() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('accessCode').value.toUpperCase();
            if (email.includes('@') && validCodes.includes(code)) {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        let audio = new Audio('kaching.mp3');
        let orderNumber = 1; 
        let timer = null;
        const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

        function startSysteem() {
            if (!isStandalone) {
                alert("⚠️ ACTION REQUIRED\n\nWhen on iOS: To enable notifications, you must add this app to your Home Screen.\n\n1. Tap the Share button below\n2. Scroll down and tap 'Add to Home Screen'");
                return;
            }

            if (timer !== null) return;
            const statusDiv = document.getElementById('status');
            Notification.requestPermission().then(perm => {
                if (perm === "granted") {
                    statusDiv.innerText = "Status: Running";
                    statusDiv.style.color = "var(--ios-dark-green)";
                    sendNotification();
                    timer = setInterval(sendNotification, document.getElementById('intervalInput').value * 1000);
                }
            });
        }

        function stopSysteem() {
            clearInterval(timer);
            timer = null;
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Status: Idle";
            statusDiv.style.color = "var(--ios-gray)";
        }

        function sendNotification() {
            let storeName = document.getElementById('storeNameInput').value.trim() || "Online Store";
            const p1 = document.getElementById('price1').value || "29.95";
            const p2 = document.getElementById('price2').value || "49.95";
            const p3 = document.getElementById('price3').value || "89.95";

            const options = [
                { price: "€" + p1, items: "1 item" },
                { price: "€" + p2, items: "2 items" },
                { price: "€" + p3, items: "3 items" }
            ];

            const randomOption = options[Math.floor(Math.random() * options.length)];
            const bodyText = randomOption.price + ", " + randomOption.items + " from Online Store • " + storeName;

            new Notification("Order #" + orderNumber, { body: bodyText, icon: "icon.png" });
            audio.play().catch(e => {});
            orderNumber++;
        }
    </script>
</body>
</html>
